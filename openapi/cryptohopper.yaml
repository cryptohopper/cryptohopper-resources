components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: 40-char OAuth2 access token
      description: |
        OAuth2 access token obtained from the developer dashboard. Sent as:

            Authorization: Bearer <40-char token>

        Optionally pair with an `x-api-app-key` header carrying your OAuth
        `client_id` — the server uses it for per-app rate-limit attribution.
    AppKey:
      type: apiKey
      in: header
      name: x-api-app-key
      description: OAuth `client_id`. Optional; attached alongside Bearer.

  schemas:
    ApiErrorBody:
      type: object
      description: |
        Error envelope returned for every non-2xx response. The `code` field
        here is a numeric server-side diagnostic (often a rate-limit bucket
        identifier); SDKs expose it as `server_code` and derive the
        machine-readable string code from the HTTP status.
      required: [status, error, message]
      properties:
        status: { type: integer }
        code: { type: integer, description: "Numeric server-side code (0 if unused)." }
        error: { type: integer, enum: [1] }
        message: { type: string }
        ip_address: { type: string, description: "Client IP the server saw." }

    BuySellInput:
      type: object
      required: [hopper_id, market]
      properties:
        hopper_id: { type: string }
        market: { type: string, example: "BTC/USDT" }
        amount: { oneOf: [{ type: string }, { type: number }] }
        price: { oneOf: [{ type: string }, { type: number }] }
      additionalProperties: true

    Hopper:
      type: object
      properties:
        id: { oneOf: [{ type: string }, { type: integer }] }
        name: { type: string }
        exchange: { type: string }
        enabled: { oneOf: [{ type: integer }, { type: boolean }] }
      additionalProperties: true

    Position:
      type: object
      properties:
        hopper_id: { oneOf: [{ type: string }, { type: integer }] }
        coin: { type: string }
        amount: { oneOf: [{ type: string }, { type: number }] }
        rate: { oneOf: [{ type: string }, { type: number }] }
      additionalProperties: true

    Order:
      type: object
      properties:
        id: { oneOf: [{ type: string }, { type: integer }] }
        hopper_id: { oneOf: [{ type: string }, { type: integer }] }
        market: { type: string }
        type: { type: string }
        amount: { oneOf: [{ type: string }, { type: number }] }
        price: { oneOf: [{ type: string }, { type: number }] }
      additionalProperties: true

    Ticker:
      type: object
      properties:
        market: { type: string }
        last: { oneOf: [{ type: string }, { type: number }] }
        bid: { oneOf: [{ type: string }, { type: number }] }
        ask: { oneOf: [{ type: string }, { type: number }] }
        volume: { oneOf: [{ type: string }, { type: number }] }
      additionalProperties: true

    Candle:
      type: object
      properties:
        time: { type: integer, format: int64 }
        open: { oneOf: [{ type: string }, { type: number }] }
        high: { oneOf: [{ type: string }, { type: number }] }
        low: { oneOf: [{ type: string }, { type: number }] }
        close: { oneOf: [{ type: string }, { type: number }] }
        volume: { oneOf: [{ type: string }, { type: number }] }
      additionalProperties: true

    Orderbook:
      type: object
      properties:
        bids: { type: array, items: { type: array, items: { oneOf: [{ type: string }, { type: number }] } } }
        asks: { type: array, items: { type: array, items: { oneOf: [{ type: string }, { type: number }] } } }
      additionalProperties: true

  responses:
    ObjectEnvelope:
      description: Success (object payload).
      content:
        application/json:
          schema:
            type: object
            required: [data]
            properties: { data: { type: object, additionalProperties: true } }

    ListEnvelope:
      description: Success (array payload).
      content:
        application/json:
          schema:
            type: object
            required: [data]
            properties:
              data: { type: array, items: { type: object, additionalProperties: true } }

    SuccessEnvelope:
      description: Success (acknowledgement, usually empty or `{success: true}`).
      content:
        application/json:
          schema:
            type: object
            required: [data]
            properties:
              data:
                type: object
                properties: { success: { type: boolean } }
                additionalProperties: true

    UserEnvelope:
      description: User profile response.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                additionalProperties: true
                properties:
                  id: { oneOf: [{ type: string }, { type: integer }] }
                  email: { type: string }
                  username: { type: string }
                  is_trial_user: { type: string }
                  userHash: { type: string }

    HopperEnvelope:
      description: Single hopper.
      content:
        application/json:
          schema:
            type: object
            properties: { data: { $ref: "#/components/schemas/Hopper" } }

    HopperListEnvelope:
      description: Array of hoppers.
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { type: array, items: { $ref: "#/components/schemas/Hopper" } }

    HopperConfigEnvelope:
      description: Hopper config.
      content:
        application/json:
          schema:
            type: object
            properties: { data: { type: object, additionalProperties: true } }

    ConfigPoolListEnvelope:
      description: Config pools.
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { type: array, items: { type: object, additionalProperties: true } }

    PositionEnvelope:
      description: Single position.
      content:
        application/json:
          schema:
            type: object
            properties: { data: { $ref: "#/components/schemas/Position" } }

    PositionListEnvelope:
      description: Positions array.
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { type: array, items: { $ref: "#/components/schemas/Position" } }

    OrderListEnvelope:
      description: Orders array.
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { type: array, items: { $ref: "#/components/schemas/Order" } }

    TickerEnvelope:
      description: Ticker.
      content:
        application/json:
          schema:
            type: object
            properties: { data: { $ref: "#/components/schemas/Ticker" } }

    CandleListEnvelope:
      description: OHLCV candles.
      content:
        application/json:
          schema:
            type: object
            properties:
              data: { type: array, items: { $ref: "#/components/schemas/Candle" } }

    OrderbookEnvelope:
      description: Orderbook.
      content:
        application/json:
          schema:
            type: object
            properties: { data: { $ref: "#/components/schemas/Orderbook" } }

    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiErrorBody" }

    Forbidden:
      description: Missing required scope OR IP-whitelist mismatch for the OAuth app.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiErrorBody" }

    NotFound:
      description: Resource or endpoint not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiErrorBody" }

    RateLimited:
      description: |
        Rate limit hit. Buckets:

          * `normal` — 30 req/min (all standard endpoints)
          * `order` — 8 per 8s window (`buy`, `sell`, `order`, `trade`)
          * `backtest` — 1 per 2s (`backtest/*`)

        Inspect the `code` field (numeric) for the exact bucket, and the
        `Retry-After` response header for the minimum wait (delta-seconds
        or HTTP-date). Every official SDK auto-retries this by default.
      headers:
        Retry-After:
          description: Seconds to wait, or an HTTP-date.
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiErrorBody" }
